<mat-toolbar color="primary">
  <a class="title" routerLink="/">Jules Productivi</a>

  <div class="toolbar-spacer"></div>

  @if (loginDisplay) {
    <a mat-button routerLink="/profile">Profile</a>
    <button mat-button (click)="logout()">Logout</button>
  } @else {
    <button mat-button (click)="login()">Login</button>
  }
</mat-toolbar>

<div class="container">
  <!-- This is needed so that when redirecting, the redirect URI doesn't display the routed component before authentication completes -->
  <router-outlet></router-outlet>
</div>
